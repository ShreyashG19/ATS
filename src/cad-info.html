<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login Form</title>
  <link rel="stylesheet" href="cad-info.css">

</head>

<body>

  <div class="wrapper">
    <div class="title-text">
      <div class="title login">Candidate Information</div>
    </div>
    <div class="form-container`">
      <!-- <div class="slide-controls"> -->
      <!-- <input type="radio" name="slide" id="login" checked>
        <input type="radio" name="slide" id="signup"> -->
      <!-- <label for="login" class="slide login">Login</label>
        <label for="signup" class="slide signup">Signup</label> -->
      <div class="slider-tab"></div>
    </div>
    <div class="form-inner">
      <form action="#" class="login">
        <div class="field">
          <input type="text" placeholder="First Name " required>
        </div>
        <div class="field">
          <input type="text" placeholder=" Middle Name" required>
        </div>
        <div class="field">
          <input type="text" placeholder=" Last Name" required>
        </div>
        <div class="field">
          <input type="text" placeholder=" Phone Number" required>
        </div>
        <div class="jobs">

          <label for="jobs" class="lb">Choose a Designation:</label>

          <select name="jobs" id="jobs-select">
            <option value="wd">Web-Developer</option>
            <option value="da">Data Analyst</option>
            <option value="jd">Java Developer</option>
            <option value="dd">Dotnet Developer </option>
          </select>



        </div>
        <div class="fileInput">
          <label for="resume" class="res">Upload Your Resume:</label>

          <input type="file" name="" id="" required>
        </div>
        <div class="field btn">
          <div class="btn-layer"></div>
          <input type="submit" value="Submit">
          <!-- <button type="submit" value="button">submit</button> -->
        </div>
      </form>
    </div>
  </div>
  </div>
</body>
